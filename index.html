<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Laporan Guru Bertugas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-sksr { background-color: #1e3a8a; }
    .tab-active { border-bottom: 4px solid #1e3a8a; color: #1e3a8a; font-weight: 800; }
    .hidden { display: none; }
    /* Style input agar seragam dan kemas */
    input, select, textarea { 
      background-color: #f8fafc !important; 
      border: 1px solid #e2e8f0 !important; 
      border-radius: 12px !important; 
      padding: 12px !important; 
      outline: none;
      width: 100%;
      font-size: 14px;
    }
    label { font-size: 10px; font-weight: 800; color: #64748b; margin-left: 8px; text-transform: uppercase; }
  </style>
</head>
<body class="bg-slate-50 pb-28 font-sans antialiased">

  <div id="pageBorang" class="max-w-xl mx-auto p-4 space-y-4">
    <header class="bg-sksr p-8 rounded-[2.5rem] text-white text-center shadow-xl">
      <img src="logo_sksr.png" alt="Logo SKSR" class="w-24 h-24 mx-auto mb-4 drop-shadow-lg object-contain">
      <h1 class="text-2xl font-black tracking-tighter uppercase">SK SIMPANG RENGAM</h1>
      <p class="text-[10px] font-medium opacity-70 tracking-[0.2em] mt-1 uppercase">iHem-Sistem Pengurusan Laporan Bertugas</p>
    </header>

    <div class="flex bg-white rounded-2xl p-1 shadow-sm font-bold text-xs uppercase">
      <button onclick="tukarTab('Harian')" id="btnH" class="flex-1 py-4 tab-active transition-all">Laporan Harian</button>
      <button onclick="tukarTab('Perhimpunan')" id="btnP" class="flex-1 py-4 text-gray-400 transition-all">Laporan Perhimpunan</button>
    </div>

    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-4 border border-gray-100">
      
      <div class="grid grid-cols-2 gap-4">
        <div><label>📅 Tarikh</label><input type="date" id="tarikh"></div>
        <div><label>🗓️ Minggu</label><input type="number" id="minggu" placeholder="Cth: 12"></div>
      </div>
      
      <div><label>👤 Pelapor</label><select id="nama"><option value="">Sila Pilih Nama</option></select></div>
      
      <div class="grid grid-cols-2 gap-4">
        <div><label>👥 Sesi</label><select id="sesi"></select></div>
        <div><label>👥 Kumpulan</label><select id="kumpulan"></select></div>
      </div>

      <div id="sectHarian" class="space-y-4 pt-4 border-t border-dashed">
        <h3 class="font-black text-blue-900 text-xs tracking-widest">📢 LAPORAN HARIAN</h3>
        <div class="grid grid-cols-2 gap-4">
            <div><label>⚖️ Disiplin</label><select id="disiplin"></select></div>
            <div><label>🧹 Kelas</label><select id="kelas"></select></div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div><label>🛡️ Keselamatan</label><select id="keselamatan"></select></div>
            <div><label>🍴 Kantin</label><select id="kantin"></select></div>
        </div>
        <div><label>📖 PdPC</label><select id="pdpc"></select></div>
        <div><label>🚨 Kes Kecemasan</label><textarea id="kecemasan" placeholder="Tulis '-' jika tiada" class="h-24"></textarea></div>
      </div>

      <div id="sectPerhimpunan" class="hidden space-y-4 pt-4 border-t border-dashed text-blue-900">
        <h3 class="font-black text-xs tracking-widest">📢 LAPORAN PERHIMPUNAN</h3>
        <div><label>📝 Laporan Lepas</label><textarea id="laporan_lepas" class="h-20"></textarea></div>
        <div><label>🎤 Ucapan Pentadbir</label><textarea id="ucapan_gb" class="h-24"></textarea></div>
        <div><label>🎤 Pentadbir Berucap</label><select id="pentadbir_berucap"></select></div>
        <div><label>📚 Hadis 40</label><input type="text" id="hadis" placeholder="Masukkan tajuk hadis"></div>
        <div><label>🌱 Nilai Sivik</label><select id="sivik"></select></div>
        <div><label>📌 Catatan</label><textarea id="catatan" class="h-20"></textarea></div>
      </div>

      <button onclick="hantar()" id="btnSend" class="w-full bg-blue-900 text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-widest active:scale-95 transition-all mt-4">Hantar Laporan</button>
    </div>
  </div>

  <div id="pageDash" class="max-w-xl mx-auto p-4 hidden animate-fade-in">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-blue-50 min-h-[400px]">
        <h2 class="font-black text-2xl text-gray-800 mb-6 flex items-center gap-2">📊 Dashboard</h2>
        <div id="boxStatus" class="space-y-4 text-center py-10 text-gray-400 font-bold uppercase text-[10px] tracking-widest">Memproses data...</div>
    </div>
  </div>

  <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-white/90 backdrop-blur shadow-2xl rounded-[2rem] p-1 flex border border-gray-100 z-[100]">
    <button onclick="tukarPage('borang')" id="navB" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] bg-blue-900 text-white transition-all">📝 BORANG</button>
    <button onclick="tukarPage('dash')" id="navD" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] text-gray-400 transition-all">📊 STATUS</button>
  </nav>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyrtygVL-bvEpy_whIRpnFW6m9TPvRZIgBy2_8UkkWSr2_QhYVHN6z4k105NbNsnDBCtg/exec";
    let jenisLaporan = "Harian";

    function tukarTab(j) {
      jenisLaporan = j;
      document.getElementById('sectHarian').classList.toggle('hidden', j !== 'Harian');
      document.getElementById('sectPerhimpunan').classList.toggle('hidden', j !== 'Perhimpunan');
      document.getElementById('btnH').className = j === 'Harian' ? "flex-1 py-4 tab-active" : "flex-1 py-4 text-gray-400";
      document.getElementById('btnP').className = j === 'Perhimpunan' ? "flex-1 py-4 tab-active" : "flex-1 py-4 text-gray-400";
    }

    function tukarPage(p) {
      const isB = p === 'borang';
      document.getElementById('pageBorang').classList.toggle('hidden', !isB);
      document.getElementById('pageDash').classList.toggle('hidden', isB);
      document.getElementById('navB').className = isB ? "flex-1 py-4 rounded-[1.5rem] font-black text-[10px] bg-blue-900 text-white" : "flex-1 py-4 rounded-[1.5rem] font-black text-[10px] text-gray-400";
      document.getElementById('navD').className = !isB ? "flex-1 py-4 rounded-[1.5rem] font-black text-[10px] bg-blue-900 text-white" : "flex-1 py-4 rounded-[1.5rem] font-black text-[10px] text-gray-400";
      if(!isB) muatStatus();
    }

    async function muatStatus() {
      const r = await fetch(GAS_URL + "?page=dashboard");
      document.getElementById('boxStatus').innerHTML = await r.text();
    }

    window.onload = async () => {
      const res = await fetch(GAS_URL);
      const d = await res.json();
      const fill = (id, list) => { 
        const el = document.getElementById(id);
        el.innerHTML = "";
        list.forEach(v => el.add(new Option(v,v))); 
      };
      fill('nama', d.guru); fill('sesi', d.sesi); fill('kumpulan', d.kumpulan);
      fill('disiplin', d.disiplin); fill('kelas', d.kelas); fill('keselamatan', d.keselamatan);
      fill('kantin', d.kantin); fill('pdpc', d.pdpc); fill('pentadbir_berucap', d.pentadbir);
      fill('sivik', d.sivik);
    };

    async function hantar() {
      const b = document.getElementById('btnSend'); b.disabled = true; b.innerText = "MENGHANTAR...";
      const data = {
        jenis_laporan: jenisLaporan,
        tarikh: document.getElementById('tarikh').value, minggu: document.getElementById('minggu').value,
        nama: document.getElementById('nama').value, sesi: document.getElementById('sesi').value, kumpulan: document.getElementById('kumpulan').value,
        disiplin: document.getElementById('disiplin').value, kelas: document.getElementById('kelas').value, keselamatan: document.getElementById('keselamatan').value,
        kantin: document.getElementById('kantin').value, pdpc: document.getElementById('pdpc').value, kecemasan: document.getElementById('kecemasan').value,
        laporan_lepas: document.getElementById('laporan_lepas').value, ucapan_gb: document.getElementById('ucapan_gb').value,
        pentadbir_berucap: document.getElementById('pentadbir_berucap').value, hadis: document.getElementById('hadis').value,
        sivik: document.getElementById('sivik').value, catatan: document.getElementById('catatan').value
      };
      await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
      alert("Tahniah! Laporan Berjaya Dihantar."); location.reload();
    }
  </script>
</body>
</html>
