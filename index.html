<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Laporan SKSR</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans">
  <div class="max-w-2xl mx-auto space-y-6">
    
    <!-- Header dengan Logo -->
    <div class="bg-blue-900 p-6 rounded-2xl text-white text-center shadow-xl">
      <img src="logo_sksr.png" alt="Logo SKSR" class="w-16 h-16 mx-auto mb-2 object-contain">
      <h1 class="text-xl font-bold uppercase tracking-wider">SK SIMPANG RENGAM</h1>
      <p class="text-[10px] opacity-80 uppercase">Laporan Guru Bertugas (e-SPSD)</p>
    </div>

    <!-- Maklumat Pentadbiran -->
    <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
      <h2 class="text-blue-700 font-bold border-b pb-2">MAKLUMAT PENTADBIRAN</h2>
      <div class="grid grid-cols-2 gap-4">
        <input type="date" id="tarikh" class="p-3 bg-gray-50 border rounded-xl outline-none">
        <input type="number" id="minggu" placeholder="Minggu" class="p-3 bg-gray-50 border rounded-xl outline-none">
      </div>
      <select id="nama" class="w-full p-3 bg-gray-50 border rounded-xl outline-none"><option value="">Pilih Nama Pelapor</option></select>
      <select id="sesi" class="w-full p-3 bg-gray-50 border rounded-xl outline-none"><option value="">Pilih Sesi/Kumpulan</option></select>
    </div>

    <!-- Laporan Harian -->
    <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4 border-l-8 border-red-500">
      <h2 class="text-red-600 font-bold border-b pb-2">🚨 LAPORAN BERTUGAS HARIAN</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
        <div><label>⚖️ Disiplin</label><select id="disiplin" class="w-full p-2 bg-gray-50 border rounded-lg"><option>Baik</option><option>Cemerlang</option><option>Sederhana</option></select></div>
        <div><label>🧹 Kelas</label><select id="kelas" class="w-full p-2 bg-gray-50 border rounded-lg"><option>Baik</option><option>Cemerlang</option><option>Sederhana</option></select></div>
        <div><label>🛡️ Keselamatan</label><select id="keselamatan" class="w-full p-2 bg-gray-50 border rounded-lg"><option>Baik</option><option>Cemerlang</option><option>Sederhana</option></select></div>
        <div><label>🍴 Kantin</label><select id="kantin" class="w-full p-2 bg-gray-50 border rounded-lg"><option>Baik</option><option>Cemerlang</option><option>Sederhana</option></select></div>
      </div>
      <div><label class="text-sm">📖 PdPC</label><select id="pdpc" class="w-full p-2 bg-gray-50 border rounded-lg"><option>Cemerlang</option><option>Baik</option><option>Memuaskan</option></select></div>
      <textarea id="kecemasan" placeholder="🚨 Kes Kecemasan (Jika ada)" class="w-full p-3 bg-gray-50 border rounded-xl text-sm h-20"></textarea>
    </div>

    <!-- Laporan Perhimpunan -->
    <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4 border-l-8 border-green-600">
      <h2 class="text-green-700 font-bold border-b pb-2">📢 LAPORAN PERHIMPUNAN</h2>
      <textarea id="laporan_lepas" placeholder="📝 Laporan Guru Bertugas Lepas" class="w-full p-3 bg-gray-50 border rounded-xl text-sm"></textarea>
      <textarea id="ucapan_gb" placeholder="🎤 Ucapan Pentadbir (Guru Besar)" class="w-full p-3 bg-gray-50 border rounded-xl text-sm"></textarea>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" id="hadis" placeholder="📚 Hadis 40" class="p-3 bg-gray-50 border rounded-xl text-sm">
        <input type="text" id="sivik" placeholder="🌱 Nilai Sivik" class="p-3 bg-gray-50 border rounded-xl text-sm">
      </div>
      <input type="text" id="catatan" placeholder="📌 Catatan Tambahan" class="w-full p-3 bg-gray-50 border rounded-xl text-sm">
    </div>

    <button onclick="hantarData()" id="btnSubmit" class="w-full bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-900 transition active:scale-95">HANTAR LAPORAN</button>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwsjHfL97saV80WOfsG4e-nj4OdQnE8obJqp2FLfKp4vBx1WnEy5lYZNmtdx63Ec63f-A/exec"; // MASUKKAN URL EXEC SELEPAS DEPLOY

    window.onload = async function() {
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        const sNama = document.getElementById('nama');
        const sSesi = document.getElementById('sesi');
        data.guru.forEach(n => { let o = document.createElement('option'); o.value=n; o.innerHTML=n; sNama.appendChild(o); });
        data.kumpulan.forEach(k => { let o = document.createElement('option'); o.value=k; o.innerHTML=k; sSesi.appendChild(o); });
      } catch (e) { console.log("Gagal tarik tetapan"); }
    };

    async function hantarData() {
      const btn = document.getElementById('btnSubmit');
      const data = {
        tarikh: document.getElementById('tarikh').value, minggu: document.getElementById('minggu').value,
        nama: document.getElementById('nama').value, sesi: document.getElementById('sesi').value,
        disiplin: document.getElementById('disiplin').value, kelas: document.getElementById('kelas').value,
        keselamatan: document.getElementById('keselamatan').value, kantin: document.getElementById('kantin').value,
        pdpc: document.getElementById('pdpc').value, kecemasan: document.getElementById('kecemasan').value,
        laporan_lepas: document.getElementById('laporan_lepas').value, ucapan_gb: document.getElementById('ucapan_gb').value,
        hadis: document.getElementById('hadis').value, sivik: document.getElementById('sivik').value, catatan: document.getElementById('catatan').value
      };
      if(!data.tarikh || !data.nama) return alert("Isi Tarikh & Nama!");
      btn.disabled = true; btn.innerText = "MENGHANTAR...";
      try {
        await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        alert("Berjaya!"); location.reload();
      } catch (e) { alert("Ralat!"); btn.disabled = false; }
    }
  </script>
</body>
</html>
