<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Laporan Guru Bertugas | SK Simpang Rengam</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 pb-20">
  <div id="pageBorang" class="max-w-xl mx-auto p-4 space-y-6">
    <header class="bg-blue-900 p-8 rounded-[2rem] text-white text-center shadow-xl">
      <img src="https://raw.githubusercontent.com/azizahshariff/laporangurubertugas/refs/heads/main/logo_sksr.png" class="w-16 h-16 mx-auto mb-2">
      <h1 class="text-xl font-bold uppercase">SK SIMPANG RENGAM</h1>
      <p class="text-[9px] tracking-widest opacity-70">LAPORAN DIGITAL GURU BERTUGAS</p>
    </header>

    <div class="flex bg-white rounded-xl p-1 shadow-sm border border-gray-100">
      <button onclick="tukarTab('Harian')" id="btnH" class="flex-1 py-3 rounded-lg bg-blue-900 text-white font-bold">Harian</button>
      <button onclick="tukarTab('Perhimpunan')" id="btnP" class="flex-1 py-3 rounded-lg text-gray-400 font-bold">Perhimpunan</button>
    </div>

    <div class="bg-white p-6 rounded-[1.5rem] shadow-lg space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-[10px] font-bold text-gray-400">TARIKH</label><input type="date" id="tarikh" class="w-full p-2 bg-gray-50 border rounded-lg"></div>
        <div><label class="text-[10px] font-bold text-gray-400">MINGGU</label><input type="number" id="minggu" class="w-full p-2 bg-gray-50 border rounded-lg"></div>
      </div>
      <div><label class="text-[10px] font-bold text-gray-400">PELAPOR</label><select id="nama" class="w-full p-2 bg-gray-50 border rounded-lg"><option>Memuatkan...</option></select></div>
      
      <div id="sectHarian" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-[10px] font-bold text-gray-400">DISIPLIN</label><select id="disiplin" class="w-full p-2 border rounded-lg"></select></div>
          <div><label class="text-[10px] font-bold text-gray-400">KEBERSIHAN</label><select id="kelas" class="w-full p-2 border rounded-lg"></select></div>
        </div>
        <button onclick="hantar()" id="btnSend" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold">HANTAR LAPORAN</button>
      </div>

      <div id="sectPerhimpunan" class="hidden space-y-4">
        <textarea id="ucapan_gb" placeholder="Isi ucapan..." class="w-full p-3 border rounded-xl h-32"></textarea>
        <button onclick="hantar()" id="btnSendP" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold">HANTAR LAPORAN</button>
      </div>
    </div>
  </div>

  <div id="pageDash" class="max-w-2xl mx-auto p-4 hidden">
    <div class="bg-white p-6 rounded-[2rem] shadow-xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="font-bold text-blue-900">REKOD PDF TERKINI</h2>
        <button onclick="muatStatus()" class="text-blue-900 text-xl">🔄</button>
      </div>
      <div id="boxStatus" class="space-y-3"></div>
    </div>
  </div>

  <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] bg-white shadow-2xl rounded-full p-2 flex border">
    <button onclick="tukarPage('borang')" class="flex-1 py-3 text-sm font-bold text-blue-900">BORANG</button>
    <button onclick="tukarPage('dash')" class="flex-1 py-3 text-sm font-bold text-gray-400">REKOD</button>
  </nav>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxhFrcIJHYtijSq3atgnucqcUB9D8wKk-wlvvcFcc53G8D-Npz29DYHq4ovl5ew2OlDRw/exec";
    let jenisLaporan = "Harian";

    window.onload = async () => {
      document.getElementById('tarikh').valueAsDate = new Date();
      const r = await fetch(GAS_URL);
      const d = await r.json();
      const isi = (id, list) => {
        const el = document.getElementById(id);
        if(el) list.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
      };
      isi("nama", d.nama); isi("disiplin", d.disiplin); isi("kelas", d.kelas);
    };

    function tukarTab(j) {
      jenisLaporan = j;
      document.getElementById('sectHarian').classList.toggle('hidden', j !== 'Harian');
      document.getElementById('sectPerhimpunan').classList.toggle('hidden', j !== 'Perhimpunan');
    }

    function tukarPage(p) {
      document.getElementById('pageBorang').classList.toggle('hidden', p !== 'borang');
      document.getElementById('pageDash').classList.toggle('hidden', p !== 'dash');
      if(p === 'dash') muatStatus();
    }

    async function muatStatus() {
  const box = document.getElementById('boxStatus');
  box.innerHTML = "<p class='text-center py-10 animate-pulse'>Menyusun Rekod Laporan...</p>";
  
  try {
    const r = await fetch(GAS_URL + "?page=dashboard");
    const d = await r.json();
    
    if (!d.files || d.files.length === 0) {
      box.innerHTML = "<p class='text-center py-10 text-gray-400'>Tiada rekod ditemui.</p>";
      return;
    }

    // Paparan mengikut format yang tuan minta
    box.innerHTML = d.files.map(f => {
      // Tentukan emoji berdasarkan jenis laporan dalam nama fail
      const isPerhimpunan = f.name.includes("Perhimpunan");
      const tajuk = isPerhimpunan ? "📢 LAPORAN PERHIMPUNAN" : "📢 LAPORAN HARIAN";
      
      return `
        <div class="bg-white border-2 border-blue-900 rounded-3xl p-6 mb-6 shadow-md font-mono text-[11px] leading-relaxed">
          <p class="font-bold text-blue-900 text-sm">${tajuk}</p>
          <p class="text-gray-400">--------------------------</p>
          
          <div class="space-y-1 mt-2">
            <p>📅 <b>TARIKH:</b> ${f.date_only || f.date}</p>
            <p>🗓️ <b>MINGGU:</b> ${f.minggu || "-"}</p>
            <p>👤 <b>PELAPOR:</b> ${f.pelapor || "-"}</p>
            <p>👥 <b>KUMPULAN:</b> ${f.kumpulan || "-"}</p>
          </div>

          <div class="mt-4 pt-4 border-t border-dashed border-gray-200">
            ${isPerhimpunan ? `
              <p>📝 <b>Laporan Lepas:</b> ${f.laporan_lepas || "-"}</p>
              <p>🎤 <b>Ucapan Pentadbir:</b> ${f.ucapan_gb || "-"}</p>
              <p>👤 <b>Pentadbir Berucap:</b> ${f.pentadbir || "-"}</p>
              <p>📚 <b>Hadis 40:</b> ${f.hadis || "-"}</p>
              <p>🌱 <b>Nilai Sivik:</b> ${f.sivik || "-"}</p>
              <p>📌 <b>Catatan:</b> ${f.catatan || "-"}</p>
            ` : `
              <p>⚖️ <b>Disiplin:</b> ${f.disiplin || "-"}</p>
              <p>🧹 <b>Kebersihan:</b> ${f.kebersihan || "-"}</p>
              <p>🛡️ <b>Keselamatan:</b> ${f.keselamatan || "-"}</p>
              <p>🍴 <b>Kantin:</b> ${f.kantin || "-"}</p>
              <p>📖 <b>PdPC:</b> ${f.pdpc || "-"}</p>
              <p>🚨 <b>Kes Kecemasan:</b> ${f.kecemasan || "Tiada"}</p>
            `}
          </div>

          <div class="mt-4 flex justify-end">
            <a href="${f.url}" target="_blank" class="bg-blue-900 text-white px-4 py-2 rounded-full font-bold text-[9px] hover:bg-blue-800 transition-all">
              Buka PDF Penuh
            </a>
          </div>
        </div>
      `;
    }).join('');
    
    document.getElementById('statTotal').innerText = d.total || 0;
  } catch (e) {
    box.innerHTML = "<p class='text-center py-10 text-red-500'>Ralat memuatkan data penuh.</p>";
  }
}

    async function hantar() {
      const data = { jenis_laporan: jenisLaporan, tarikh: document.getElementById('tarikh').value, nama: document.getElementById('nama').value };
      await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
      alert("HANTAR BERJAYA!");
      location.reload();
    }
  </script>
</body>
</html>
