<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Laporan Guru Bertugas SKSR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { background: #1e3a8a; color: white; }
        .hidden { display: none; }
        .card-report { font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">
    <div id="borangPage" class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-blue-900 text-white p-6 rounded-3xl text-center shadow-lg">
            <h1 class="font-bold text-xl uppercase">SK SIMPANG RENGAM</h1>
            <p class="text-[10px] tracking-widest opacity-80">LAPORAN GURU BERTUGAS</p>
        </div>

        <div class="flex bg-white p-1 rounded-xl shadow-sm">
            <button onclick="setTab('Harian')" id="tH" class="flex-1 py-3 rounded-lg font-bold tab-active">HARIAN</button>
            <button onclick="setTab('Perhimpunan')" id="tP" class="flex-1 py-3 rounded-lg font-bold text-gray-400">PERHIMPUNAN</button>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] font-bold">TARIKH</label><input type="date" id="tarikh" class="w-full border p-2 rounded-lg bg-gray-50"></div>
                <div><label class="text-[10px] font-bold">MINGGU</label><input type="number" id="minggu" class="w-full border p-2 rounded-lg bg-gray-50"></div>
            </div>
            <div><label class="text-[10px] font-bold">PELAPOR</label><select id="nama" class="w-full border p-2 rounded-lg bg-gray-50"></select></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] font-bold">SESI</label><select id="sesi" class="w-full border p-2 rounded-lg bg-gray-50"></select></div>
                <div><label class="text-[10px] font-bold">KUMPULAN</label><select id="kumpulan" class="w-full border p-2 rounded-lg bg-gray-50"></select></div>
            </div>

            <div id="sHarian" class="space-y-4 pt-4 border-t border-dashed">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[10px] font-bold">⚖️ DISIPLIN</label><select id="disiplin" class="w-full border p-2 rounded-lg"></select></div>
                    <div><label class="text-[10px] font-bold">🧹 KEBERSIHAN</label><select id="kelas" class="w-full border p-2 rounded-lg"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[10px] font-bold">🛡️ KESELAMATAN</label><select id="keselamatan" class="w-full border p-2 rounded-lg"></select></div>
                    <div><label class="text-[10px] font-bold">🍴 KANTIN</label><select id="kantin" class="w-full border p-2 rounded-lg"></select></div>
                </div>
                <div><label class="text-[10px] font-bold">📖 PdPC</label><select id="pdpc" class="w-full border p-2 rounded-lg"></select></div>
                <textarea id="kecemasan" placeholder="Kes Kecemasan (Jika ada)" class="w-full border p-3 rounded-xl h-20 bg-gray-50"></textarea>
            </div>

            <div id="sPerhimpunan" class="hidden space-y-4 pt-4 border-t border-dashed">
                <textarea id="laporan_lepas" placeholder="Laporan Lepas..." class="w-full border p-3 rounded-xl h-20 bg-gray-50"></textarea>
                <textarea id="ucapan_gb" placeholder="Ucapan Pentadbir..." class="w-full border p-3 rounded-xl h-24 bg-gray-50"></textarea>
                <div><label class="text-[10px] font-bold">👤 PENTADBIR BERUCAP</label><select id="pentadbir_berucap" class="w-full border p-2 rounded-lg"></select></div>
                <input type="text" id="hadis" placeholder="Hadis 40 Minggu Ini" class="w-full border p-2 rounded-lg bg-gray-50">
                <div><label class="text-[10px] font-bold">🌱 NILAI SIVIK</label><select id="sivik" class="w-full border p-2 rounded-lg"></select></div>
                <textarea id="catatan" placeholder="Catatan Tambahan..." class="w-full border p-3 rounded-xl h-20 bg-gray-50"></textarea>
            </div>

            <button onclick="hantar()" id="btnS" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg">HANTAR LAPORAN</button>
        </div>
    </div>

    <div id="rekodPage" class="max-w-md mx-auto p-4 hidden">
        <h2 class="font-bold text-blue-900 mb-4 px-2">REKOD LAPORAN TERKINI</h2>
        <div id="boxStatus" class="space-y-4"></div>
    </div>

    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-white shadow-2xl rounded-full p-2 flex border">
        <button onclick="nav('borang')" id="nb" class="flex-1 py-3 text-xs font-bold bg-blue-900 text-white rounded-full">ISI LAPORAN</button>
        <button onclick="nav('rekod')" id="nr" class="flex-1 py-3 text-xs font-bold text-gray-400">LAPORAN PDF</button>
    </nav>

    <script>
        const GAS_URL = "Ghttps://script.google.com/macros/s/AKfycbyTl1aRWcjKk3umuuD7s8N2N-uTEcZGiJxNZklFIFLISL8BDFf5IYpMiAbPk39Kd03c4Q/exec";
        let tab = "Harian";

        window.onload = async () => {
            document.getElementById('tarikh').valueAsDate = new Date();
            const r = await fetch(GAS_URL);
            const d = await r.json();
            const isi = (id, list) => {
                const el = document.getElementById(id);
                if(el) { el.innerHTML = '<option value="">-- PILIH --</option>'; list.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`); }
            };
            isi("nama", d.nama); isi("sesi", d.sesi); isi("kumpulan", d.kumpulan);
            isi("disiplin", d.disiplin); isi("kelas", d.kelas); isi("keselamatan", d.keselamatan);
            isi("kantin", d.kantin); isi("pdpc", d.pdpc); isi("pentadbir_berucap", d.pentadbir_berucap); isi("sivik", d.sivik);
        };

        function setTab(t) {
            tab = t;
            document.getElementById('sHarian').classList.toggle('hidden', t !== 'Harian');
            document.getElementById('sPerhimpunan').classList.toggle('hidden', t !== 'Perhimpunan');
            document.getElementById('tH').className = t === 'Harian' ? "flex-1 py-3 rounded-lg font-bold tab-active" : "flex-1 py-3 rounded-lg font-bold text-gray-400";
            document.getElementById('tP').className = t === 'Perhimpunan' ? "flex-1 py-3 rounded-lg font-bold tab-active" : "flex-1 py-3 rounded-lg font-bold text-gray-400";
        }

        function nav(p) {
            document.getElementById('borangPage').classList.toggle('hidden', p !== 'borang');
            document.getElementById('rekodPage').classList.toggle('hidden', p !== 'rekod');
            document.getElementById('nb').className = p === 'borang' ? "flex-1 py-3 text-xs font-bold bg-blue-900 text-white rounded-full" : "flex-1 py-3 text-xs font-bold text-gray-400";
            document.getElementById('nr').className = p === 'rekod' ? "flex-1 py-3 text-xs font-bold bg-blue-900 text-white rounded-full" : "flex-1 py-3 text-xs font-bold text-gray-400";
            if(p === 'rekod') muatStatus();
        }

        async function muatStatus() {
            const b = document.getElementById('boxStatus');
            b.innerHTML = "<p class='text-center p-10 opacity-50'>Memuatkan...</p>";
            const r = await fetch(GAS_URL + "?page=dashboard");
            const d = await r.json();
            b.innerHTML = d.files.map(f => {
                const isH = f.type === "Harian";
                return `
                <div class="bg-white border-l-8 ${isH ? 'border-blue-900' : 'border-green-600'} rounded-2xl p-5 shadow-sm card-report text-[10px]">
<p class="font-bold text-blue-900 text-xs">📢 LAPORAN ${f.type.toUpperCase()}</p>
--------------------------
📅 TARIKH: ${new Date(f.date).toLocaleDateString('en-GB')}
🗓️ MINGGU: ${f.minggu}
👤 PELAPOR: ${f.nama}
👥 SESI: ${f.sesi}
👥 KUMPULAN: ${f.kumpulan}

${isH ? 
`⚖️ Disiplin: ${f.details.disiplin}
🧹 Kelas: ${f.details.kelas}
🛡️ Keselamatan: ${f.details.keselamatan}
🍴 Kantin: ${f.details.kantin}
📖 PdPC: ${f.details.pdpc}
🚨 Kes Kecemasan: ${f.details.kecemasan || 'Tiada'}` : 
`📝 Laporan Lepas: ${f.details.laporan_lepas}
🎤 Ucapan Pentadbir: ${f.details.ucapan_gb}
👤 Pentadbir Berucap: ${f.details.pentadbir}
📚 Hadis 40: ${f.details.hadis}
🌱 Nilai Sivik: ${f.details.sivik}
📌 Catatan: ${f.details.catatan}`}
                </div>`;
            }).join('');
        }

        async function hantar() {
            const b = document.getElementById('btnS');
            b.disabled = true; b.innerText = "MENGHANTAR...";
            const d = {
                jenis_laporan: tab, tarikh: document.getElementById('tarikh').value, minggu: document.getElementById('minggu').value,
                nama: document.getElementById('nama').value, sesi: document.getElementById('sesi').value, kumpulan: document.getElementById('kumpulan').value
            };
            if(tab === "Harian") {
                Object.assign(d, { disiplin: document.getElementById('disiplin').value, kelas: document.getElementById('kelas').value, keselamatan: document.getElementById('keselamatan').value, kantin: document.getElementById('kantin').value, pdpc: document.getElementById('pdpc').value, kecemasan: document.getElementById('kecemasan').value });
            } else {
                Object.assign(d, { laporan_lepas: document.getElementById('laporan_lepas').value, ucapan_gb: document.getElementById('ucapan_gb').value, pentadbir_berucap: document.getElementById('pentadbir_berucap').value, hadis: document.getElementById('hadis').value, sivik: document.getElementById('sivik').value, catatan: document.getElementById('catatan').value });
            }
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(d) });
            alert("✅ BERJAYA!");
            location.reload();
        }
    </script>
</body>
</html>
