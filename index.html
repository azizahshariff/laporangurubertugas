<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Laporan Guru Bertugas/title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-active { background: #1e3a8a; color: white; transform: scale(1.05); }
        .hidden { display: none; }
        .card-report { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <header class="bg-blue-900 pt-10 pb-12 px-6 rounded-b-[3rem] text-white text-center shadow-2xl">
        <img src="https://raw.githubusercontent.com/azizahshariff/laporangurubertugas/main/logo_sksr.png" 
             alt="Logo SKSR" 
             class="w-24 h-24 mx-auto mb-4 drop-shadow-2xl object-contain"
             onerror="this.src='https://via.placeholder.com/100?text=SKSR'">
        <h1 class="text-xl font-extrabold uppercase tracking-tight">SK SIMPANG RENGAM</h1>
        <p class="text-[9px] font-bold opacity-70 tracking-[0.3em] mt-1">SISTEM PENGURUSAN LAPORAN GURU BERTUGAS</p>
    </header>

    <div class="max-w-md mx-auto px-4 -mt-8">
        <div class="flex bg-white p-1.5 rounded-2xl shadow-lg mb-6 border border-gray-100">
            <button onclick="setTab('Harian')" id="tH" class="flex-1 py-3 rounded-xl font-bold transition-all tab-active">HARIAN</button>
            <button onclick="setTab('Perhimpunan')" id="tP" class="flex-1 py-3 rounded-xl font-bold transition-all text-gray-400">PERHIMPUNAN</button>
        </div>

        <div id="borangPage" class="space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-50 space-y-5">
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-blue-900 ml-1">📅 TARIKH</label>
                        <input type="date" id="tarikh" class="w-full mt-1 p-3 bg-gray-50 border-none rounded-2xl text-sm font-semibold"></div>
                    <div><label class="text-[10px] font-black text-blue-900 ml-1">🗓️ MINGGU</label>
                        <input type="number" id="minggu" placeholder="00" class="w-full mt-1 p-3 bg-gray-50 border-none rounded-2xl text-sm font-semibold text-center"></div>
                </div>

                <div><label class="text-[10px] font-black text-blue-900 ml-1">👤 NAMA PELAPOR</label>
                    <select id="nama" class="w-full mt-1 p-3 bg-gray-50 border-none rounded-2xl text-sm font-semibold focus:ring-2 focus:ring-blue-900"></select></div>

                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-blue-900 ml-1">👥 SESI</label>
                        <select id="sesi" class="w-full mt-1 p-3 bg-gray-50 border-none rounded-2xl text-sm font-semibold"></select></div>
                    <div><label class="text-[10px] font-black text-blue-900 ml-1">👥 KUMPULAN</label>
                        <select id="kumpulan" class="w-full mt-1 p-3 bg-gray-50 border-none rounded-2xl text-sm font-semibold"></select></div>
                </div>

                <div id="sHarian" class="space-y-4 pt-4 border-t border-dashed border-gray-200">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold opacity-60">⚖️ DISIPLIN</label><select id="disiplin" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                        <div><label class="text-[10px] font-bold opacity-60">🧹 KELAS</label><select id="kelas" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold opacity-60">🛡️ KESELAMATAN</label><select id="keselamatan" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                        <div><label class="text-[10px] font-bold opacity-60">🍴 KANTIN</label><select id="kantin" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                    </div>
                    <div><label class="text-[10px] font-bold opacity-60">📖 PdPC</label><select id="pdpc" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                    <textarea id="kecemasan" placeholder="🚨 Catatan Kes Kecemasan (Jika ada)..." class="w-full p-4 bg-red-50 border-none rounded-2xl text-xs h-24"></textarea>
                </div>

                <div id="sPerhimpunan" class="hidden space-y-4 pt-4 border-t border-dashed border-gray-200">
                    <textarea id="laporan_lepas" placeholder="📝 Laporan Unit/Minggu Lepas..." class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xs h-24"></textarea>
                    <textarea id="ucapan_gb" placeholder="🎤 Ucapan/Amanat Pentadbir..." class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xs h-32"></textarea>
                    <div><label class="text-[10px] font-bold opacity-60">👤 PENTADBIR BERUCAP</label><select id="pentadbir_berucap" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                    <input type="text" id="hadis" placeholder="📚 Hadis 40 Minggu Ini" class="w-full p-3 bg-slate-50 rounded-xl text-xs">
                    <div><label class="text-[10px] font-bold opacity-60">🌱 NILAI SIVIK</label><select id="sivik" class="w-full p-3 bg-slate-50 rounded-xl text-xs"></select></div>
                    <textarea id="catatan" placeholder="📌 Catatan Tambahan Perhimpunan..." class="w-full p-4 bg-slate-50 border-none rounded-2xl text-xs h-24"></textarea>
                </div>

                <button onclick="hantar()" id="btnS" class="w-full bg-blue-900 text-white py-5 rounded-[1.5rem] font-extrabold shadow-blue-200 shadow-2xl hover:bg-blue-800 transition-all active:scale-95">HANTAR LAPORAN</button>
            </div>
        </div>

        <div id="rekodPage" class="hidden space-y-4">
            <h2 class="font-extrabold text-blue-900 text-lg px-2">Rekod Laporan Terkini</h2>
            <div id="boxStatus" class="space-y-4"></div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[85%] max-w-xs bg-white/80 backdrop-blur-lg shadow-2xl rounded-full p-2 flex border border-white/50">
        <button onclick="nav('borang')" id="nb" class="flex-1 py-3 text-[10px] font-black bg-blue-900 text-white rounded-full transition-all">ISI LAPORAN</button>
        <button onclick="nav('rekod')" id="nr" class="flex-1 py-3 text-[10px] font-black text-gray-400 rounded-full transition-all">LAPORAN PDF</button>
    </nav>

    <script>
        // PENTING: Gantikan URL ini dengan Web App URL dari Deployment terbaru anda!
        const GAS_URL = "https://script.google.com/macros/s/AKfycby62YRp6uzhD_dAqwuhjrg1JVjLOQBst41LHcyOwPbUl7CXdNkFz5-BSMehcAqU4adAkQ/exec";
        let tab = "Harian";

        window.onload = async () => {
            document.getElementById('tarikh').valueAsDate = new Date();
            try {
                const r = await fetch(GAS_URL);
                const d = await r.json();
                const isi = (id, list) => {
                    const el = document.getElementById(id);
                    if(el && list) { 
                        el.innerHTML = '<option value="">-- SILA PILIH --</option>'; 
                        list.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`); 
                    }
                };
                isi("nama", d.nama); isi("sesi", d.sesi); isi("kumpulan", d.kumpulan);
                isi("disiplin", d.disiplin); isi("kelas", d.kelas); isi("keselamatan", d.keselamatan);
                isi("kantin", d.kantin); isi("pdpc", d.pdpc); isi("pentadbir_berucap", d.pentadbir_berucap); isi("sivik", d.sivik);
            } catch(e) { console.error("Data Tetapan gagal dimuatkan."); }
        };

        function setTab(t) {
            tab = t;
            document.getElementById('sHarian').classList.toggle('hidden', t !== 'Harian');
            document.getElementById('sPerhimpunan').classList.toggle('hidden', t !== 'Perhimpunan');
            document.getElementById('tH').className = t === 'Harian' ? "flex-1 py-3 rounded-xl font-bold tab-active" : "flex-1 py-3 rounded-xl font-bold text-gray-400";
            document.getElementById('tP').className = t === 'Perhimpunan' ? "flex-1 py-3 rounded-xl font-bold tab-active" : "flex-1 py-3 rounded-xl font-bold text-gray-400";
        }

        function nav(p) {
            document.getElementById('borangPage').classList.toggle('hidden', p !== 'borang');
            document.getElementById('rekodPage').classList.toggle('hidden', p !== 'rekod');
            document.getElementById('nb').className = p === 'borang' ? "flex-1 py-3 text-[10px] font-black bg-blue-900 text-white rounded-full" : "flex-1 py-3 text-[10px] font-black text-gray-400";
            document.getElementById('nr').className = p === 'rekod' ? "flex-1 py-3 text-[10px] font-black bg-blue-900 text-white rounded-full" : "flex-1 py-3 text-[10px] font-black text-gray-400";
            if(p === 'rekod') muatStatus();
        }

        async function muatStatus() {
            const b = document.getElementById('boxStatus');
            b.innerHTML = "<p class='text-center p-10 text-xs opacity-50 font-bold'>Sedang menyusun rekod...</p>";
            try {
                const r = await fetch(GAS_URL + "?page=dashboard");
                const d = await r.json();
                b.innerHTML = d.files.map(f => {
                    const isH = f.type === "Harian";
                    return `
                    <div class="bg-white border-l-[10px] ${isH ? 'border-blue-900' : 'border-emerald-500'} rounded-3xl p-6 shadow-sm card-report text-[11px] leading-relaxed">
                        <p class="font-black text-blue-900 text-sm mb-1 uppercase tracking-tighter">📢 LAPORAN ${f.type.toUpperCase()}</p>
                        <p class="text-gray-300 mb-2">----------------------------------</p>
                        <p>📅 <b>TARIKH:</b> ${new Date(f.date).toLocaleDateString('en-GB')}</p>
                        <p>🗓️ <b>MINGGU:</b> ${f.minggu}</p>
                        <p>👤 <b>PELAPOR:</b> ${f.nama}</p>
                        <p>👥 <b>SESI:</b> ${f.sesi} | <b>KUMPULAN:</b> ${f.kumpulan}</p>
                        <div class="mt-4 pt-4 border-t border-dashed border-gray-100">
                            ${isH ? 
                            `⚖️ <b>Disiplin:</b> ${f.details.disiplin}<br>🧹 <b>Kelas:</b> ${f.details.kelas}<br>🛡️ <b>Keselamatan:</b> ${f.details.keselamatan}<br>🍴 <b>Kantin:</b> ${f.details.kantin}<br>📖 <b>PdPC:</b> ${f.details.pdpc}<br>🚨 <b>Kecemasan:</b> ${f.details.kecemasan || 'Tiada'}` : 
                            `📝 <b>Laporan Lepas:</b> ${f.details.laporan_lepas}<br>🎤 <b>Ucapan GB:</b> ${f.details.ucapan_gb}<br>👤 <b>Pentadbir:</b> ${f.details.pentadbir}<br>📚 <b>Hadis 40:</b> ${f.details.hadis}<br>🌱 <b>Nilai Sivik:</b> ${f.details.sivik}<br>📌 <b>Catatan:</b> ${f.details.catatan}`}
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { b.innerHTML = "<p class='text-center p-10 text-red-400'>Ralat memuatkan rekod.</p>"; }
        }

        async function hantar() {
            const b = document.getElementById('btnS');
            const data = {
                jenis_laporan: tab, tarikh: document.getElementById('tarikh').value, minggu: document.getElementById('minggu').value,
                nama: document.getElementById('nama').value, sesi: document.getElementById('sesi').value, kumpulan: document.getElementById('kumpulan').value
            };
            
            if(!data.nama || !data.minggu) return alert("Sila isi Nama Pelapor dan Minggu!");

            b.disabled = true; b.innerText = "MENGHANTAR LAPORAN...";

            if(tab === "Harian") {
                Object.assign(data, {
                    disiplin: document.getElementById('disiplin').value, kelas: document.getElementById('kelas').value, 
                    keselamatan: document.getElementById('keselamatan').value, kantin: document.getElementById('kantin').value, 
                    pdpc: document.getElementById('pdpc').value, kecemasan: document.getElementById('kecemasan').value
                });
            } else {
                Object.assign(data, {
                    laporan_lepas: document.getElementById('laporan_lepas').value, ucapan_gb: document.getElementById('ucapan_gb').value, 
                    pentadbir_berucap: document.getElementById('pentadbir_berucap').value, hadis: document.getElementById('hadis').value, 
                    sivik: document.getElementById('sivik').value, catatan: document.getElementById('catatan').value
                });
            }

            try {
                await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
                alert("✅ LAPORAN BERJAYA DIHANTAR KE GOOGLE SHEETS, TELEGRAM & PDF!");
                location.reload();
            } catch(e) {
                alert("Ralat penghantaran!");
                b.disabled = false; b.innerText = "HANTAR LAPORAN";
            }
        }
    </script>
</body>
</html>
